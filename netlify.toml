[build]
  publish = "snapibaby"
  functions = "netlify/functions"
  command = "npm install && npm --prefix netlify/functions install"

[build.environment]
  # SUPABASE_URL é uma URL pública usada no frontend — não é um segredo real
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

[functions]
  node_bundler = "esbuild"

[functions."process-order-background"]
  # Background Function — runs up to 15 minutes (required for KIE AI polling)
  # Netlify automatically treats functions ending in -background as background functions

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Garante que HTMLs nunca sejam cacheados — novo deploy = novo codigo
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
