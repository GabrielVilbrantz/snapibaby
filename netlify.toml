[build]
  publish = "snapibaby"
  functions = "netlify/functions"
  command = "npm install && npm --prefix netlify/functions install"

[functions]
  node_bundler = "esbuild"

[functions."process-order-background"]
  # Background Function — runs up to 15 minutes (required for KIE AI polling)
  # Netlify automatically treats functions ending in -background as background functions

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
